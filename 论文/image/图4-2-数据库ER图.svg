  <g transform="translate(760,140)">
    <rect width="280" height="170" class="entity"/>
    <rect width="280" height="36" class="headBlue"/>
    <text x="18" y="24" class="entityTitle">sys_user</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">username, password</text>
    <text x="18" y="108" class="field">display_name, student_no</text>
    <text x="18" y="132" class="field">role, status</text>
    <text x="18" y="156" class="field">total_distance_km, points</text>
  </g>

  <g transform="translate(420,380)">
    <rect width="280" height="180" class="entity"/>
    <rect width="280" height="36" class="headGreen"/>
    <text x="18" y="24" class="entityTitle">run_session</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">FK user_id -&gt; sys_user.id</text>
    <text x="18" y="108" class="field">state, started_at, finished_at</text>
    <text x="18" y="132" class="field">distance_km, duration_seconds</text>
    <text x="18" y="156" class="field">route_point_count, cloud_session_id</text>
  </g>

  <g transform="translate(760,400)">
    <rect width="280" height="150" class="entity"/>
    <rect width="280" height="36" class="headAmber"/>
    <text x="18" y="24" class="entityTitle">daily_checkin</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">FK user_id -&gt; sys_user.id</text>
    <text x="18" y="108" class="field">FK source_run_id -&gt; run_session.id</text>
    <text x="18" y="132" class="field">checkin_date, streak_days</text>
  </g>

  <g transform="translate(1100,360)">
    <rect width="300" height="170" class="entity"/>
    <rect width="300" height="36" class="headViolet"/>
    <text x="18" y="24" class="entityTitle">user_run_plan</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">FK user_id -&gt; sys_user.id</text>
    <text x="18" y="108" class="field">FK template_id -&gt; run_plan_template.id</text>
    <text x="18" y="132" class="field">status, started_on</text>
    <text x="18" y="156" class="field">current_day_index</text>
  </g>

  <g transform="translate(1440,360)">
    <rect width="280" height="150" class="entity"/>
    <rect width="280" height="36" class="headViolet"/>
    <text x="18" y="24" class="entityTitle">user_run_plan_day</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">FK user_run_plan_id</text>
    <text x="18" y="108" class="field">FK source_run_id -&gt; run_session.id</text>
    <text x="18" y="132" class="field">day_index, completed</text>
  </g>

  <g transform="translate(1120,150)">
    <rect width="260" height="140" class="entity"/>
    <rect width="260" height="36" class="headViolet"/>
    <text x="18" y="24" class="entityTitle">run_plan_template</text>
    <text x="18" y="60" class="field">PK id</text>
    <text x="18" y="84" class="field">code, title, plan_type</text>
    <text x="18" y="108" class="field">duration_days, target_runs</text>
    <text x="18" y="132" class="field">target_distance_km</text>
  </g>

  <g transform="translate(80,380)">
