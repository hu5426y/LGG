<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .label { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .text { font: 14px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #334155; }
      .small { font: 13px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .layerA { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 24; ry: 24; }
      .layerB { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 24; ry: 24; }
      .layerC { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 24; ry: 24; }
      .layerD { fill: #faf5ff; stroke: #8b5cf6; stroke-width: 2; rx: 24; ry: 24; }
      .module { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.8; rx: 16; ry: 16; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1460" height="940" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="30" ry="30"/>
  <text x="750" y="68" text-anchor="middle" class="title">系统总体架构图</text>
  <text x="750" y="98" text-anchor="middle" class="subtitle">从表现层、接口层、业务层到数据与支撑层的完整分层结构</text>
  <g>
    <path d="M310 280 V330" class="arrow"/>
    <path d="M750 280 V330" class="arrow"/>
    <path d="M1180 280 V330" class="arrow"/>
    <path d="M750 460 V515" class="arrow"/>
    <path d="M750 790 V810" class="arrow"/>
  </g>

  <rect x="80" y="140" width="1340" height="160" class="layerA"/>
  <text x="120" y="178" class="label">表现层</text>
  <rect x="160" y="210" width="300" height="70" class="module"/>
  <text x="310" y="252" text-anchor="middle" class="label">微信小程序学生端</text>
  <rect x="600" y="210" width="300" height="70" class="module"/>
  <text x="750" y="252" text-anchor="middle" class="label">Web 管理后台</text>
  <rect x="1040" y="210" width="280" height="70" class="module"/>
  <text x="1180" y="252" text-anchor="middle" class="label">浏览器 / 微信环境</text>

  <rect x="80" y="340" width="1340" height="150" class="layerB"/>
  <text x="120" y="378" class="label">接口与安全层</text>
  <rect x="170" y="400" width="250" height="60" class="module"/>
  <text x="295" y="438" text-anchor="middle" class="text">REST API / JSON</text>
  <rect x="460" y="400" width="250" height="60" class="module"/>
  <text x="585" y="438" text-anchor="middle" class="text">Spring Security + JWT</text>
  <rect x="750" y="400" width="250" height="60" class="module"/>
  <text x="875" y="438" text-anchor="middle" class="text">统一异常处理 / 参数校验</text>
  <rect x="1040" y="400" width="250" height="60" class="module"/>
  <text x="1165" y="438" text-anchor="middle" class="text">@PreAuthorize 权限控制</text>

  <rect x="80" y="530" width="1340" height="260" class="layerC"/>
  <text x="120" y="568" class="label">业务层</text>
  <rect x="130" y="610" width="170" height="62" class="module"/>
  <text x="215" y="648" text-anchor="middle" class="text">认证与用户</text>
  <rect x="330" y="610" width="170" height="62" class="module"/>
  <text x="415" y="648" text-anchor="middle" class="text">首页聚合</text>
  <rect x="530" y="610" width="170" height="62" class="module"/>
  <text x="615" y="648" text-anchor="middle" class="text">跑步记录</text>
  <rect x="730" y="610" width="170" height="62" class="module"/>
  <text x="815" y="648" text-anchor="middle" class="text">每日打卡</text>
  <rect x="930" y="610" width="170" height="62" class="module"/>
  <text x="1015" y="648" text-anchor="middle" class="text">跑步计划</text>
  <rect x="1130" y="610" width="170" height="62" class="module"/>
  <text x="1215" y="648" text-anchor="middle" class="text">成长激励</text>

  <rect x="230" y="700" width="170" height="62" class="module"/>
  <text x="315" y="738" text-anchor="middle" class="text">社交互动</text>
  <rect x="480" y="700" width="170" height="62" class="module"/>
  <text x="565" y="738" text-anchor="middle" class="text">活动与教程</text>
  <rect x="730" y="700" width="170" height="62" class="module"/>
  <text x="815" y="738" text-anchor="middle" class="text">排行榜缓存</text>
  <rect x="980" y="700" width="220" height="62" class="module"/>
  <text x="1090" y="738" text-anchor="middle" class="text">后台运营与统计分析</text>

  <rect x="80" y="820" width="1340" height="110" class="layerD"/>
  <text x="120" y="858" class="label">数据与支撑层</text>
  <rect x="170" y="872" width="240" height="42" class="module"/>
  <text x="290" y="898" text-anchor="middle" class="text">MySQL 业务数据</text>
  <rect x="470" y="872" width="240" height="42" class="module"/>
  <text x="590" y="898" text-anchor="middle" class="text">Redis 排行榜缓存</text>
  <rect x="770" y="872" width="240" height="42" class="module"/>
  <text x="890" y="898" text-anchor="middle" class="text">Flyway 数据迁移</text>
  <rect x="1070" y="872" width="240" height="42" class="module"/>
  <text x="1190" y="898" text-anchor="middle" class="text">Docker / Swagger / Actuator</text>

  <text x="1280" y="165" class="small">学生与管理员分别从不同终端访问系统</text>
  <text x="1275" y="364" class="small">统一接口前缀 /api，统一令牌认证机制</text>
  <text x="1210" y="565" class="small">核心业务模块围绕跑步主链路和运营支撑展开</text>
</svg>
