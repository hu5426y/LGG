<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1260" viewBox="0 0 1280 1260">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .startEnd { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.4; rx: 26; ry: 26; }
      .process { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 16; ry: 16; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; }
      .risk { fill: #ffe4e6; stroke: #e11d48; stroke-width: 2; rx: 16; ry: 16; }
      .ok { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 16; ry: 16; }
      .label { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .text { font: 14px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #334155; }
      .line { stroke: #475569; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .hint { font: 13px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1240" height="1220" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="30" ry="30"/>
  <text x="640" y="68" text-anchor="middle" class="title">动态审核流程图</text>
  <text x="640" y="98" text-anchor="middle" class="subtitle">从学生发布动态到后台审核和再次上架的闭环过程</text>
  <g>
    <path d="M640 200 V255" class="line"/>
    <path d="M640 333 V390" class="line"/>
    <path d="M460 470 H280 V620" class="line"/>
    <path d="M820 470 H1000 V620" class="line"/>
    <path d="M280 702 V800" class="line"/>
    <path d="M280 882 V940" class="line"/>
    <path d="M450 1015 H700 V861 H800" class="line"/>
    <path d="M1000 702 V820" class="line"/>
    <path d="M1000 902 V960" class="line"/>
    <path d="M915 1035 H795 V1140" class="line"/>
    <path d="M1000 1110 V1140" class="line"/>
    <path d="M980 1110 H565 V1140" class="line"/>
    <path d="M795 1140 V1080 H280 V1090" class="line"/>
  </g>

  <rect x="480" y="130" width="320" height="70" class="startEnd"/>
  <text x="640" y="173" text-anchor="middle" class="label">学生发布动态</text>
  <rect x="380" y="255" width="520" height="78" class="process"/>
  <text x="640" y="302" text-anchor="middle" class="text">后端创建动态记录，并根据敏感词词典执行风险标签初筛</text>
  <polygon points="640,390 820,470 640,550 460,470" class="decision"/>
  <text x="640" y="465" text-anchor="middle" class="text">正文是否命中敏感词或风险标签</text>

  <rect x="130" y="620" width="300" height="82" class="ok"/>
  <text x="280" y="656" text-anchor="middle" class="text">直接审核通过</text>
  <text x="280" y="680" text-anchor="middle" class="text">进入动态广场和首页热门内容</text>

  <rect x="850" y="620" width="300" height="82" class="risk"/>
  <text x="1000" y="656" text-anchor="middle" class="text">进入待审核状态</text>
  <text x="1000" y="680" text-anchor="middle" class="text">默认不在学生公开列表展示</text>

  <rect x="120" y="800" width="320" height="82" class="process"/>
  <text x="280" y="836" text-anchor="middle" class="text">其他学生可对已公开动态点赞、评论、举报</text>
  <text x="280" y="860" text-anchor="middle" class="text">系统实时更新点赞数、评论数和举报数</text>

  <polygon points="280,940 450,1015 280,1090 110,1015" class="decision"/>
  <text x="280" y="1008" text-anchor="middle" class="text">举报数是否达到阈值</text>
  <text x="280" y="1032" text-anchor="middle" class="text">需要重新审核</text>

  <rect x="800" y="820" width="400" height="82" class="process"/>
  <text x="1000" y="856" text-anchor="middle" class="text">管理员在后台审核页查看内容、风险标签和举报数</text>
  <text x="1000" y="880" text-anchor="middle" class="text">可执行通过、拒绝、下架、置顶操作</text>

  <polygon points="1000,960 1170,1035 1000,1110 830,1035" class="decision"/>
  <text x="1000" y="1028" text-anchor="middle" class="text">管理员审核结果</text>

  <rect x="700" y="1140" width="190" height="62" class="ok"/>
  <text x="795" y="1178" text-anchor="middle" class="text">通过 / 置顶</text>
  <rect x="930" y="1140" width="190" height="62" class="risk"/>
  <text x="1025" y="1178" text-anchor="middle" class="text">拒绝 / 下架</text>
  <rect x="470" y="1140" width="190" height="62" class="process"/>
  <text x="565" y="1178" text-anchor="middle" class="text">写入审计日志</text>

  <text x="300" y="605" class="hint">否</text>
  <text x="965" y="605" class="hint">是</text>
  <text x="474" y="1004" class="hint">达到阈值</text>
  <text x="720" y="1030" class="hint">进入后台审核</text>
  <text x="200" y="1115" class="hint">未达到阈值则继续公开展示</text>
</svg>
