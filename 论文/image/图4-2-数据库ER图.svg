<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .entityTitle { font: 700 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .field { font: 13px 'Consolas', 'Courier New', monospace; fill: #334155; }
      .note { font: 13px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .entity { fill: #ffffff; stroke: #64748b; stroke-width: 1.8; rx: 14; ry: 14; }
      .headBlue { fill: #dbeafe; }
      .headGreen { fill: #dcfce7; }
      .headAmber { fill: #fef3c7; }
      .headRose { fill: #ffe4e6; }
      .headViolet { fill: #ede9fe; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; }
      .card { font: 700 14px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1e293b; }
    </style>
  </defs>

  <rect x="20" y="20" width="1760" height="1210" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="30" ry="30"/>
  <text x="900" y="65" text-anchor="middle" class="title">数据库 E-R 图</text>
  <text x="900" y="94" text-anchor="middle" class="subtitle">依据数据库迁移脚本整理的核心实体及其关系</text>
  <g>
