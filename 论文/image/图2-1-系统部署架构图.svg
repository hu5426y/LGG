<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #4b5563; }
      .label { font: 600 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111827; }
      .text { font: 14px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #374151; }
      .small { font: 13px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #4b5563; }
      .frame { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 22; ry: 22; }
      .boxBlue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 18; ry: 18; }
      .boxGreen { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 18; ry: 18; }
      .boxAmber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 18; ry: 18; }
      .boxRose { fill: #ffe4e6; stroke: #e11d48; stroke-width: 2; rx: 18; ry: 18; }
      .boxSlate { fill: #e2e8f0; stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="860" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="28" ry="28"/>
  <text x="700" y="65" text-anchor="middle" class="title">系统部署架构图</text>
  <text x="700" y="95" text-anchor="middle" class="subtitle">基于 Docker Compose 的前后端分离部署方式</text>
  <rect x="70" y="150" width="1260" height="650" class="frame"/>

  <rect x="110" y="260" width="250" height="180" class="boxBlue"/>
  <text x="235" y="300" text-anchor="middle" class="label">微信小程序端</text>
  <text x="235" y="334" text-anchor="middle" class="text">学生用户使用</text>
  <text x="235" y="362" text-anchor="middle" class="text">跑步记录 / 打卡 / 社交 / 活动</text>
  <text x="235" y="390" text-anchor="middle" class="text">微信开发者工具或真机访问</text>

  <rect x="110" y="520" width="250" height="160" class="boxBlue"/>
  <text x="235" y="560" text-anchor="middle" class="label">浏览器端</text>
  <text x="235" y="594" text-anchor="middle" class="text">管理员访问</text>
  <text x="235" y="622" text-anchor="middle" class="text">Dashboard / 审核 / 统计</text>

  <rect x="460" y="120" width="780" height="610" class="boxSlate"/>
  <text x="110" y="185" class="label">宿主机 / 服务器环境</text>
  <text x="110" y="212" class="small">Windows + WSL / Linux 均可部署，统一通过 Docker Compose 管理服务</text>
  <text x="510" y="160" class="label">Docker Compose 服务编排层</text>
  <text x="510" y="188" class="small">负责统一启动网络、依赖服务、环境变量与容器生命周期</text>

  <rect x="520" y="250" width="280" height="170" class="boxGreen"/>
  <text x="660" y="292" text-anchor="middle" class="label">admin-web + Nginx</text>
  <text x="660" y="326" text-anchor="middle" class="text">Vue 3 管理后台静态资源</text>
  <text x="660" y="354" text-anchor="middle" class="text">通过浏览器提供管理界面</text>
  <text x="660" y="382" text-anchor="middle" class="text">对外访问后台页面</text>

  <rect x="900" y="250" width="280" height="170" class="boxGreen"/>
  <text x="1040" y="292" text-anchor="middle" class="label">backend</text>
  <text x="1040" y="326" text-anchor="middle" class="text">Spring Boot REST API</text>
  <text x="1040" y="354" text-anchor="middle" class="text">认证、跑步、打卡、社交、后台</text>
  <text x="1040" y="382" text-anchor="middle" class="text">统一以 /api 对外提供服务</text>

  <rect x="520" y="500" width="280" height="150" class="boxAmber"/>
  <text x="660" y="540" text-anchor="middle" class="label">MySQL 8.0</text>
  <text x="660" y="574" text-anchor="middle" class="text">业务数据持久化</text>
  <text x="660" y="602" text-anchor="middle" class="text">Flyway 管理表结构迁移</text>

  <rect x="900" y="500" width="280" height="150" class="boxRose"/>
  <text x="1040" y="540" text-anchor="middle" class="label">Redis 7</text>
  <text x="1040" y="574" text-anchor="middle" class="text">排行榜与高频查询缓存</text>
  <text x="1040" y="602" text-anchor="middle" class="text">降低数据库排序压力</text>

  <rect x="520" y="760" width="660" height="70" fill="#eef2ff" stroke="#6366f1" stroke-width="2" rx="16" ry="16"/>
  <text x="850" y="803" text-anchor="middle" class="text">支撑能力：Swagger/OpenAPI、Actuator 健康检查、本地联调脚本、日志与测试体系</text>

  <text x="430" y="337" class="small">HTTPS / API 请求</text>
  <text x="430" y="585" class="small">页面访问</text>
  <text x="827" y="325" class="small">反向代理 / 接口转发</text>
  <text x="1080" y="456" class="small">数据读写</text>
  <text x="685" y="470" class="small">业务查询</text>
  <g>
    <path d="M360 350 H490" class="arrow"/>
    <path d="M360 600 H490 V335 H520" class="arrow"/>
    <path d="M800 335 H870" class="arrow"/>
    <path d="M1040 420 V470" class="arrow"/>
    <path d="M1040 500 V430" class="dash"/>
    <path d="M660 500 V430 H980" class="arrow"/>
  </g>
</svg>
