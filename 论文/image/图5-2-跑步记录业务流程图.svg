<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1480" viewBox="0 0 1200 1480">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
      .startEnd { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.4; rx: 26; ry: 26; }
      .process { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 16; ry: 16; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; }
      .label { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .text { font: 14px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #334155; }
      .line { stroke: #475569; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .hint { font: 13px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="1440" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="30" ry="30"/>
  <text x="600" y="68" text-anchor="middle" class="title">跑步记录业务流程图</text>
  <text x="600" y="98" text-anchor="middle" class="subtitle">从开始跑步、轨迹采集到有效性校验和成长反馈的完整链路</text>
  <g>
    <path d="M600 200 V250" class="line"/>
    <path d="M600 328 V380" class="line"/>
    <path d="M440 450 H290 V585" class="line"/>
    <path d="M760 450 H900 V560 H710 V585" class="line"/>
    <path d="M710 663 V725" class="line"/>
    <path d="M710 813 V870" class="line"/>
    <path d="M550 940 H245 V1085" class="line"/>
    <path d="M710 1010 V1085" class="line"/>
    <path d="M245 1085 V1045 H710 V870" class="line"/>
    <path d="M710 1163 V1215" class="line"/>
    <path d="M530 1290 H400" class="line"/>
    <path d="M890 1290 H880" class="line"/>
    <path d="M1000 1348 V1380" class="line"/>
  </g>

  <rect x="440" y="130" width="320" height="70" class="startEnd"/>
  <text x="600" y="173" text-anchor="middle" class="label">开始</text>
  <rect x="360" y="250" width="480" height="78" class="process"/>
  <text x="600" y="297" text-anchor="middle" class="text">学生登录后进入跑步页，点击“开始跑步”</text>
  <polygon points="600,380 760,450 600,520 440,450" class="decision"/>
  <text x="600" y="455" text-anchor="middle" class="text">定位权限和定位状态是否正常</text>

  <rect x="150" y="585" width="280" height="78" class="process"/>
  <text x="290" y="620" text-anchor="middle" class="text">提示开启定位权限</text>
  <text x="290" y="644" text-anchor="middle" class="text">或重新获取当前位置</text>

  <rect x="520" y="585" width="380" height="78" class="process"/>
  <text x="710" y="620" text-anchor="middle" class="text">调用 /api/runs/start 创建跑步会话</text>
  <text x="710" y="644" text-anchor="middle" class="text">服务端检查是否存在未结束记录</text>

  <rect x="520" y="725" width="380" height="88" class="process"/>
  <text x="710" y="765" text-anchor="middle" class="text">小程序启动计时器、定位监听和加速度监听</text>
  <text x="710" y="789" text-anchor="middle" class="text">持续累计时长、里程、步数、卡路里与轨迹点</text>

  <polygon points="710,870 870,940 710,1010 550,940" class="decision"/>
  <text x="710" y="936" text-anchor="middle" class="text">用户是否暂停 / 继续 / 放弃</text>
  <text x="710" y="958" text-anchor="middle" class="text">或结束本次跑步</text>

  <rect x="120" y="1085" width="250" height="78" class="process"/>
  <text x="245" y="1120" text-anchor="middle" class="text">暂停时冻结实时统计</text>
  <text x="245" y="1144" text-anchor="middle" class="text">继续时恢复采集</text>

  <rect x="475" y="1085" width="470" height="78" class="process"/>
  <text x="710" y="1120" text-anchor="middle" class="text">结束跑步并提交结果</text>
  <text x="710" y="1144" text-anchor="middle" class="text">上传时长、距离、轨迹点、设备信息和传感器摘要</text>

  <polygon points="710,1215 890,1290 710,1365 530,1290" class="decision"/>
  <text x="710" y="1280" text-anchor="middle" class="text">后端有效性校验是否通过</text>
  <text x="710" y="1302" text-anchor="middle" class="text">300秒 / 0.5km / 5点 / 25km-h / 时间递增</text>

  <rect x="120" y="1260" width="280" height="78" class="process"/>
  <text x="260" y="1295" text-anchor="middle" class="text">返回失败提示，不保存异常记录</text>
  <text x="260" y="1319" text-anchor="middle" class="text">用户可重新开始或修改后再试</text>

  <rect x="880" y="1250" width="240" height="98" class="process"/>
  <text x="1000" y="1286" text-anchor="middle" class="text">保存跑步结果</text>
  <text x="1000" y="1310" text-anchor="middle" class="text">更新累计数据</text>
  <text x="1000" y="1334" text-anchor="middle" class="text">刷新排行榜缓存</text>

  <rect x="880" y="1380" width="240" height="58" class="startEnd"/>
  <text x="1000" y="1416" text-anchor="middle" class="label">结束</text>

  <text x="330" y="567" class="hint">否</text>
  <text x="910" y="548" class="hint">是</text>
  <text x="390" y="919" class="hint">暂停 / 继续</text>
  <text x="725" y="1063" class="hint">结束并提交</text>
  <text x="420" y="1280" class="hint">否</text>
  <text x="840" y="1280" class="hint">是</text>
</svg>
